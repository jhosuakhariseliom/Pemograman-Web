<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>soal 2</title>
</head>
    <style>
        body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }
    </style>
<body>
    <form>
        <table border="1" style="border-collapse: collapse; font-family: serif;">
            <tr>
                <td colspan="2" style="background-color: #d0d0d0; text-align: center; font-size: 28px; padding: 5px;">
                    Edit profile
                </td>
            </tr>
            <tr>
                <td style="text-align: center; padding: 10px; vertical-align: top;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Sir_Tim_Berners-Lee_%28cropped%29.jpg" width="100" alt="Tim Berners-Lee"><br><br>
                    <input type="button" value="Upload">
                </td>
                <td style="padding: 10px; vertical-align: top;">
                    <table cellpadding="3">
                        <tr>
                            <td>Name</td>
                            <td>Tim Berners-Lee</td>
                        </tr>
                        <tr>
                            <td>Position</td>
                            <td>
                                <select>
                                    <optgroup label="Programmer">
                                        <option selected>Senior Programmer</option>
                                        <option>Junior Programmer</option>
                                    </optgroup>
                                    <optgroup label="System Analyst">
                                        <option>Senior Analyst</option>
                                        <option>Junior Analyst</option>
                                    </optgroup>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td>Password</td>
                            <td><input type="text" value=""></td>
                        </tr>
                        <tr>
                            <td>Confirm Password</td>
                            <td><input type="password" value=""></td>
                        </tr>
                        <tr>
                            <td colspan="2" style="text-align: right; padding-top: 15px;">
                                <input type="reset" value="Reset"> 
                                <input type="submit" value="Update">
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
