<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>soal 4</title>
</head>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
    </style>
<body>
    <div style="border: 1px solid black; padding: 15px; width: 380px; font-family: 'Times New Roman', serif; box-shadow: 3px 3px 5px #888888;">
  <h2 style="margin-top: 0;">Form Tambah Data User</h2>
  <form>
    <table cellpadding="4" cellspacing="0">
      <tr>
        <td width="35%">Name</td>
        <td>: <input type="text" style="width: 200px;" required oninvalid="this.setCustomValidity('Name is required!!!')" oninput="this.setCustomValidity('')"></td>
      </tr>
      <tr>
        <td>Address</td>
        <td>: <input type="text" style="width: 200px;" required oninvalid="this.setCustomValidity('Address is required!!!')" oninput="this.setCustomValidity('')"></td>
      </tr>
      <tr>
        <td>Email</td>
        <td>: <input type="email" style="width: 200px;" required oninvalid="if(this.value===''){this.setCustomValidity('Harap isi bidang ini.')}else{this.setCustomValidity('Sertakan \'@\' pada alamat email ini. \''+this.value+'\' tidak memiliki \'@\'')}" oninput="this.setCustomValidity('')"></td>
      </tr>
      <tr>
        <td>Home Page</td>
        <td>: <input type="url" style="width: 200px;"></td>
      </tr>
      <tr>
        <td>Birthday</td>
        <td>: <input type="date" style="width: 150px;"></td>
      </tr>
      <tr>
        <td>Favorit Color</td>
        <td>: <input type="color" value="#000000"></td>
      </tr>
      <tr>
        <td>IPK</td>
        <td>: <input type="number" min="0" max="4" step="0.1" value="0" style="width: 80px;"></td>
      </tr>
      <tr>
        <td>Phone Number</td>
        <td>: <input type="tel" style="width: 200px;" pattern="\d{3}-\d{7,10}" title="Format: ###-####### (3 digit di depan, 7-10 digit di belakang)"></td>
      </tr>
      <tr>
        <td></td>
        <td style="padding-top: 10px;">&nbsp;&nbsp;<input type="submit" value="Add" style="padding: 2px 10px;"></td>
      </tr>
    </table>
  </form>
</div>
</body>
</html>
