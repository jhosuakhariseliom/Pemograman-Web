<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>NRP-Nama</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
      table {
        border-collapse: collapse;
        width: 60%;
        margin-top: 15px;
      }
      th,
      td {
        border: 1px solid black;
        padding: 8px;
        text-align: left;
      }
      th {
        background-color: #f2f2f2;
      }
    </style>
  </head>
  <body>
    <h3>
      Selamat! Berikut adalah Daftar Mahasiswa yang mendapat Nilai A Pemrograman
      Web SI Tahun Ajaran 2023/2024
    </h3>

    <input type="radio" name="kelas" value="nilai.js" checked /> All<br />
    <input type="radio" name="kelas" value="nilaiA.js" /> Kelas A<br />
    <input type="radio" name="kelas" value="nilaiB.js" /> Kelas B<br /><br />

    <button id="searchBtn">Search</button>

    <table id="tabelNilai">
      <thead>
        <tr>
          <th>NRP</th>
          <th>NAMA</th>
          <th>KELAS</th>
          <th>NILAI AKHIR</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      $(document).ready(function () {
        $("#searchBtn").click(function () {
          // Mendapatkan nilai dari radio button yang dipilih
          let fileTarget = $(":radio[name='kelas']:checked").val();

          $.getJSON(fileTarget, function (data) {
            let tbody = $("#tabelNilai tbody");
            tbody.empty(); // Kosongkan tabel sebelum mengisi data baru

            $.each(data.nilai, function (i, mhs) {
              let tr = $("<tr>").append(
                $("<td>").text(mhs.nrp),
                $("<td>").text(mhs.nama),
                $("<td>").text(mhs.kelas),
                $("<td>").text(mhs.nilaiakhir),
              );
              tbody.append(tr);
            });

            // Pewarnaan baris ganjil dan genap
            $("#tabelNilai tbody tr:odd").css("background-color", "#CCFFAA");
            $("#tabelNilai tbody tr:even").css("background-color", "#FFFFCC");
          }).fail(function () {
            alert("Gagal memuat file " + fileTarget);
          });
        });
      });
    </script>
  </body>
</html>
