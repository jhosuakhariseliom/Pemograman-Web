<!DOCTYPE html>
<html>
<head>
    <title>NRP-Nama</title>
    <style>
        textarea{
            width:300px;
            height:120px;
        }
    </style>
</head>
<body>

<h2>Character Counter</h2>

<textarea id="txt1" onkeyup="call_onKeyPress(this)" onkeydown="call_onKeyPress(this)"></textarea>
<br><br>
<input type="text" id="txt2" value="0/256" readonly>

<script>
function call_onKeyPress(ob){
    let obval = ob.value;

    if(obval.length > 256){
        ob.value = obval.substr(0,256);
        obval = ob.value;
    }

    document.getElementById("txt2").value = obval.length + "/256";
}
</script>

</body>
</html>
