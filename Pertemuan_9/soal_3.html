<!DOCTYPE html>
<html>
<head>
    <title>NRP-Nama</title>
    <script src="jquery-4.0.0.min.js"></script>
    <style>
        .kotak{
            width:50px;
            height:50px;
            border:1px solid black;
            display:inline-block;
            margin:5px;
        }
    </style>
</head>
<body>

<div class="kotak"></div>
<div class="kotak"></div>
<div class="kotak"></div>
<div class="kotak"></div>
<div class="kotak"></div>

<br><br>

<button id="change">Change Colors</button>

<script>
$(document).ready(function(){

    $(".kotak").click(function(){
        $(this).css("background","red");
    });

    $("#change").click(function(){

        let flag = false;

        $(".kotak").each(function(){

            if($(this).css("background-color") == "rgb(255, 0, 0)"){
                flag = true;
            }

            if(!flag){
                $(this).css("background","yellow");
            }

        });

    });

});
</script>

</body>
</html>
