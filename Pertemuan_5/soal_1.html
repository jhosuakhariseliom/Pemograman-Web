<!DOCTYPE html>
<html>
<head>
  <title>NRP-Nama - Soal 1</title>
  <style>
    body { font-family: Arial; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0f0f0; }
    .container { text-align: center; }
    a.star-link {
      display: inline-block;
      border: 4px solid #FF0000;
      padding: 10px;
      text-decoration: none;
    }
    a.star-link:hover {
      border-color: #FF00FF;
    }
    a.star-link img {
      width: 150px;
      height: 150px;
      display: block;
    }
    /* Corner borders using CSS (since no actual star image) */
    .frame {
      display: inline-block;
      position: relative;
      padding: 20px;
    }
    .frame::before, .frame::after,
    .frame span::before, .frame span::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
    }
    .frame::before { top: 0; left: 0; border-top: 4px solid #FF0000; border-left: 4px solid #FF0000; }
    .frame::after  { top: 0; right: 0; border-top: 4px solid #FF0000; border-right: 4px solid #FF0000; }
    .frame span::before { bottom: 0; left: 0; border-bottom: 4px solid #FF0000; border-left: 4px solid #FF0000; }
    .frame span::after  { bottom: 0; right: 0; border-bottom: 4px solid #FF0000; border-right: 4px solid #FF0000; }

    a.star-frame {
      display: inline-block;
      text-decoration: none;
    }
    a.star-frame .frame::before { border-color: #FF0000; }
    a.star-frame .frame::after  { border-color: #FF0000; }
    a.star-frame .frame span::before { border-color: #FF0000; }
    a.star-frame .frame span::after  { border-color: #FF0000; }

    a.star-frame:hover .frame::before,
    a.star-frame:hover .frame::after,
    a.star-frame:hover .frame span::before,
    a.star-frame:hover .frame span::after {
      border-color: #FF00FF;
    }

    .star-img {
      width: 150px;
      height: 150px;
      /* Using a colored star as placeholder */
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Soal 1 - Hover Border Color</h2>
    <a href="#" class="star-frame">
      <div class="frame">
        <span></span>
        <!-- Star emoji sebagai pengganti gambar bintang Mario -->
        <div style="font-size:100px; line-height:150px; width:150px; text-align:center;">⭐</div>
      </div>
    </a>
    <p style="color: #555;">Hover di atas gambar untuk melihat perubahan warna border dari #FF0000 ke #FF00FF</p>
  </div>
</body>
</html>
